# .github/workflows/develop.yml
name: Develop CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user_service, product_service, order_service, payment_service, auth_service]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          cd ${{ matrix.service }}
          pip install -r requirements.txt

      - name: Run tests (if any)
        run: |
          cd ${{ matrix.service }}
          pytest || echo "No tests found"

      - name: Run black (code format check)
        run: |
          cd ${{ matrix.service }}
          black . --check || echo "Formatting issues detected"
